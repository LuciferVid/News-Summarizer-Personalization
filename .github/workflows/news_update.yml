name: Periodic News Update

on:
  schedule:
    # Run every 2 hours to keep Render alive and DB populated
    - cron: '0 */2 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  refresh-news:
    runs-on: ubuntu-latest
    steps:
      - name: Wake Up Render Service
        run: |
          BACKEND="${{ secrets.BACKEND_URL }}"
          if [ -z "$BACKEND" ]; then
            BACKEND="https://news-summarizer-personalization.onrender.com"
          fi

          echo "Waking up Render service at $BACKEND..."
          # First call wakes the service - allow up to 120s for cold start
          curl -s --max-time 120 "$BACKEND/health" || echo "Wake-up ping sent (may still be booting)"

          # Give Render a moment to fully boot
          sleep 10

      - name: Trigger Refresh Endpoint
        run: |
          BACKEND="${{ secrets.BACKEND_URL }}"
          if [ -z "$BACKEND" ]; then
            BACKEND="https://news-summarizer-personalization.onrender.com"
          fi

          echo "Triggering news refresh..."
          curl -X POST "$BACKEND/news/refresh" \
               -H "Content-Type: application/json" \
               --max-time 300 \
               --fail || echo "Refresh timed out but startup fetch should handle it"
